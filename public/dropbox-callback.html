<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dropbox — connecting…</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           height: 100vh; font-family: sans-serif; background: #f8fafc; color: #374151; }
    .box { text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid #d1d5db;
               border-top-color: #0061FE; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Connecting to Dropbox…</p>
  </div>
  <script>
    (function () {
      // Parse the URL hash that Dropbox puts the token into
      // e.g. #access_token=TOKEN&token_type=bearer&uid=...
      var hash = window.location.hash.slice(1);
      var params = {};
      hash.split('&').forEach(function (pair) {
        var parts = pair.split('=');
        if (parts.length === 2) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
      });

      if (params.access_token) {
        // Send the token back to the parent window that opened this popup
        if (window.opener) {
          window.opener.postMessage(
            { type: 'DROPBOX_TOKEN', token: params.access_token },
            window.location.origin
          );
        }
        window.close();
      } else if (params.error) {
        if (window.opener) {
          window.opener.postMessage(
            { type: 'DROPBOX_ERROR', error: params.error_description || params.error },
            window.location.origin
          );
        }
        window.close();
      }
    })();
  </script>
</body>
</html>
